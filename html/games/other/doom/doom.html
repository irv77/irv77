<!doctype html>

<!-- copied from https://raw.githubusercontent.com/mdn/webassembly-examples/master/understanding-text-format/logger2.html (CC0) -->

<html>

  <head>
    <meta charset="utf-8">
    <title>DooM Fullscreen</title>
    <link rel='icon' type='image/x-icon' href='favicon.ico'/>

    <style>
      html, body {
        background: #22293d; 
        width:  100%;
        height: 100%;
        margin: 0;
      }

      canvas {
        border: 12px groove #181b25;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
      <canvas id="screen" width="1120" height="700" tabindex="0">This is where the DooM screen should render.</canvas>
    <script src="main.js" defer></script>
  </body>
</html>
